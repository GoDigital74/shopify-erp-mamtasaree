services:
  # The PostgreSQL Database
  - type: psql
    name: shopify-erp-db
    plan: free

  # The Express Backend
  - type: web
    name: shopify-erp-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    preDeployCommand: "cd backend && npx prisma db push"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopify-erp-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: HOST
        value: "" # You will update this after deployment
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: "read_products,write_products,read_orders,read_inventory,write_inventory,read_customers"
      - key: FRONTEND_URL
        value: "" # You will update this to Vercel URL
